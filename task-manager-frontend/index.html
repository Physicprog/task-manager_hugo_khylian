  <!--

      To create a production bundle, use `npm run build` or `yarn build`.
    -->

  <!--on charge le react plus tard pour que le style arrive avant afin éviter des lags au début-->
  <script type="text/javascript">
    function loadJSAtOnload() {

  setTimeout(() => {
      var element = document.createElement("div");
      element.id = "root";
      element.type = "module";
      document.body.appendChild(element);
    }, 50);

      setTimeout(() => {
        var element = document.createElement("script");
        element.src = "/src/index.jsx";
        element.type = "module";  
        document.body.appendChild(element);
      }, 200);
    }

    if (window.addEventListener) {
      window.addEventListener("load", loadJSAtOnload, false);
    } else if (window.attachEvent) {
      window.attachEvent("onload", loadJSAtOnload);
    } else {
      window.onload = loadJSAtOnload;
    }
  </script>

</body>

</html>
